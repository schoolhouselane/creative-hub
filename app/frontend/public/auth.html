<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Creative Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f3ef;
      min-height: 100vh;
      display: flex;
    }
    .left {
      width: 380px;
      flex-shrink: 0;
      background: #1e1e20;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    @media (max-width: 768px) { .left { display: none; } }
    .left-logo { width: 171px; height: 68px; }
    .left-title { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.3; }
    .left-sub { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.6; }
    .left-copy { font-size: 12px; color: rgba(255,255,255,0.2); }
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card { width: 100%; max-width: 360px; }
    h2 { font-size: 24px; font-weight: 700; color: #1e1e20; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #8c8c8c; margin-bottom: 28px; }
    .toggle {
      display: flex;
      background: #fff;
      border: 1px solid #e2e2e2;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #8c8c8c;
      transition: all 0.15s;
    }
    .toggle button.active {
      background: #1e1e20;
      color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .hint { font-size: 12px; color: #8c8c8c; margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #1e1e20; margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%;
      border: 1px solid #e2e2e2;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #1e1e20;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1e1e20; }
    input::placeholder { color: #c4c4c4; }
    .error {
      background: #fef2f2;
      color: #dc2626;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }
    #submit-btn {
      width: 100%;
      background: #1e1e20;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    #submit-btn:hover { opacity: 0.9; }
    #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer { text-align: center; font-size: 12px; color: #8c8c8c; margin-top: 28px; }
    .footer a { color: #8c8c8c; }
  </style>
</head>
<body>
  <div class="left">
    <img src="/logo.png" alt="Schoolhouse Lane" class="left-logo" onerror="this.style.display='none'">
    <div>
      <div class="left-title">Creative Hub</div>
      <div class="left-sub">AI-powered creative production for brands that move fast.</div>
    </div>
    <div class="left-copy">© 2026 Schoolhouse Lane</div>
  </div>

  <div class="right">
    <div class="card">
      <h2>Sign in</h2>
      <p class="sub">Choose your account type to continue</p>

      <div class="toggle">
        <button type="button" class="active" id="btn-staff" onclick="setRole('staff')">Staff</button>
        <button type="button" id="btn-client" onclick="setRole('client')">Client</button>
      </div>

      <p class="hint" id="hint">Sign in to manage brands, briefs and AI creative production.</p>

      <form id="login-form" onsubmit="handleSubmit(); return false">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@schoolhouselane.co" autocomplete="email" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />

        <div class="error" id="error-msg"></div>

        <button type="button" id="submit-btn" onclick="handleSubmit()">Sign in</button>
      </form>

      <p class="footer">
        Need access? <a href="mailto:hello@schoolhouselane.co">Contact Schoolhouse Lane</a>
      </p>
    </div>
  </div>

  <script>
    var currentRole = 'staff';

    function setRole(role) {
      currentRole = role;
      document.getElementById('btn-staff').className = role === 'staff' ? 'active' : '';
      document.getElementById('btn-client').className = role === 'client' ? 'active' : '';
      document.getElementById('email').placeholder = role === 'staff' ? 'you@schoolhouselane.co' : 'you@company.com';
      document.getElementById('hint').textContent = role === 'staff'
        ? 'Sign in to manage brands, briefs and AI creative production.'
        : 'Sign in to submit and track your creative briefs.';
      document.getElementById('error-msg').style.display = 'none';
    }

    // Discover API base URL from runtime config (works in prod and local dev)
    var _apiBase = '';
    async function getApiBase() {
      if (_apiBase) return _apiBase;
      try {
        var r = await fetch('/api/config');
        var ct = r.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          var d = await r.json();
          if (d && d.API_BASE_URL) { _apiBase = d.API_BASE_URL; return _apiBase; }
        }
      } catch(e) {}
      return '';
    }

    async function handleSubmit() {
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var btn = document.getElementById('submit-btn');
      var err = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      var base = await getApiBase();
      var endpoint = base + (currentRole === 'staff'
        ? '/api/v1/auth/staff/login'
        : '/api/v1/auth/client/login');

      try {
        var res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        if (!res.ok) {
          throw new Error('Invalid email or password');
        }

        var data = await res.json();

        if (currentRole === 'staff') {
          localStorage.setItem('ch_staff_token', data.token);
          window.location.href = '/';
        } else {
          localStorage.setItem('ch_client_token', data.token);
          window.location.href = '/client';
        }
      } catch (ex) {
        err.textContent = 'Invalid email or password. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
